<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalNine HR - Attendance Management</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>GlobalNine HR</h2>
                <p class="subtitle">Admin Dashboard</p>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="attendance.html" class="nav-item active">
                    <span class="icon">📋</span>
                    <span>Attendance</span>
                </a>
                <a href="leave.html" class="nav-item">
                    <span class="icon">✈️</span>
                    <span>Leave</span>
                </a>
                <a href="client_visit.html" class="nav-item">
                    <span class="icon">🏢</span>
                    <span>Client Visits</span>
                </a>
                <a href="employees.html" class="nav-item">
                    <span class="icon">👥</span>
                    <span>Employees</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="logoutBtn" class="settings-link">
                    <span class="icon">🚪</span>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="search-box">
                    <input type="text" placeholder="Search employees..." id="searchInput">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="top-bar-right">
                    <button class="notification-btn">
                        <span class="bell-icon">🔔</span>
                        <span class="notification-badge">3</span>
                    </button>
                    <div class="user-profile">
                        <div class="avatar" id="userAvatar">A</div>
                    </div>
                </div>
            </div>

            <!-- Page Header -->
            <div style="margin-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <h1 style="font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem;">Attendance Logs</h1>
                        <p style="color: #6b7280; font-size: 0.95rem;">View and manage employee attendance records, GPS locations, and verifications.</p>
                    </div>
                    <button class="download-btn">📥 Export CSV</button>
                </div>
            </div>

            <!-- Search and Filters -->
            <div style="margin-bottom: 2rem;">
                <div style="display: grid; grid-template-columns: 1fr auto auto auto auto; gap: 1rem; margin-bottom: 1.5rem;">
                    <div class="search-box" style="grid-column: 1;">
                        <input type="text" placeholder="Search by Employee Name or ID..." id="filterEmployee">
                        <span class="search-icon">🔍</span>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <select id="filterDepartment" style="padding: 0.625rem 1rem; border: 1px solid #e5e7eb; border-radius: 0.5rem; font-size: 0.95rem;">
                            <option value="">All Departments</option>
                            <option value="HR">HR</option>
                            <option value="IT">IT</option>
                            <option value="Finance">Finance</option>
                            <option value="Sales">Sales</option>
                            <option value="Marketing">Marketing</option>
                        </select>
                    </div>
                    <div>
                        <input type="date" id="filterDate" style="padding: 0.625rem 1rem; border: 1px solid #e5e7eb; border-radius: 0.5rem; font-size: 0.95rem;">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <select id="filterStatus" style="padding: 0.625rem 1rem; border: 1px solid #e5e7eb; border-radius: 0.5rem; font-size: 0.95rem;">
                            <option value="">Status All</option>
                            <option value="Present">Present</option>
                            <option value="Late">Late</option>
                            <option value="Absent">Absent</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Attendance List -->
            <section class="card">
                <div id="attendanceListContainer">
                    <div style="padding: 2rem; text-align: center; color: #6b7280;">Loading attendance records...</div>
                </div>
            </section>

            <!-- Pagination -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 2rem;">
                <p style="color: #6b7280; font-size: 0.9rem;">Showing <span id="paginationStart">1</span> to <span id="paginationEnd">4</span> of <span id="paginationTotal">45</span> results</p>
                <div style="display: flex; gap: 0.5rem;">
                    <button id="prevBtn" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.9rem;">Previous</button>
                    <button id="nextBtn" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.9rem;">Next</button>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/script.js"></script>
    <script src="../js/admin-attendance.js"></script>
</body>
</html>
