<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT.GlobalNine - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="auth-badge">
                <i class="fas fa-shield-alt"></i> Secure Access
            </div>

            <div class="login-header">
                <h1>PT.GlobalNine</h1>
                <p class="login-subtitle">Masuk ke workspace presensi Anda</p>
            </div>
            
            <form id="loginForm" class="login-form-styled">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Masukkan username" autocomplete="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-field">
                        <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password" required>
                        <button type="button" class="password-toggle" data-toggle-password data-target="password" aria-label="Tampilkan password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-row">
                    <label class="auth-check" for="rememberLogin">
                        <input type="checkbox" id="rememberLogin">
                        <span>Ingat username saya</span>
                    </label>
                    <button type="button" class="auth-link-btn" id="forgotPasswordBtn">Lupa password?</button>
                </div>
                
                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="auth-divider"><span>atau</span></div>

            <button type="button" class="google-auth-btn" data-auth-mode="signin">
                <i class="fab fa-google"></i>
                Masuk dengan Google
            </button>

            <p class="auth-alt-link">
                Belum punya akun? <a href="signup.html">Buat akun</a>
            </p>

            <div class="login-footer">
                <p><strong>Demo Account:</strong></p>
                <p style="font-size: 0.85rem; color: #6b7280; margin: 0.5rem 0;">
                    <strong>Admin:</strong> admin / admin
                </p>
                <p style="font-size: 0.85rem; color: #6b7280;">
                    <strong>User:</strong> user / user
                </p>
            </div>
        </div>
    </div>

    <script src="js/app-config.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
