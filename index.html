<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT.GlobalNine - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="auth-top-bar">
        <div class="header-actions">
            <!-- Toggles will be injected here by script.js -->
        </div>
    </div>
    <div class="login-background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="auth-badge">
                <i class="fas fa-shield-alt"></i> Secure Access
            </div>

            <div class="login-header">
                <h1 class="gradient-text">PT.GlobalNine</h1>
                <p class="login-subtitle">Akses kehadiran Anda dengan sekali ketukan</p>
            </div>
            
            <div class="google-login-section">
                <button type="button" class="google-auth-btn primary-auth" data-auth-mode="signin">
                    <div class="google-icon-wrapper">
                        <i class="fab fa-google"></i>
                    </div>
                    <span class="google-btn-text">Lanjutkan dengan Google</span>
                </button>
            </div>

            <div class="auth-info-footer">
                <p>Klik tombol di atas untuk masuk atau mendaftar otomatis menggunakan akun Google perusahaan Anda.</p>
            </div>

            <div class="login-footer">
                <p>© 2026 PT. GlobalNine. All rights reserved.</p>
                <p class="footer-note">Sistem Presensi Digital Terintegrasi</p>
            </div>
        </div>
    </div>

    <script src="js/app-config.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
