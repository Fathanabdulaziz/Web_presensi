<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalNine HR - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>GlobalNine HR</h1>
                <p class="login-subtitle">System Management Portal</p>
            </div>
            
            <form id="loginForm" class="login-form-styled">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Masukkan username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                </div>
                
                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="login-footer">
                <p><strong>Demo Account:</strong></p>
                <p style="font-size: 0.85rem; color: #6b7280; margin: 0.5rem 0;">
                    <strong>Admin:</strong> admin / admin
                </p>
                <p style="font-size: 0.85rem; color: #6b7280;">
                    <strong>User:</strong> user / user
                </p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
