<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT.GlobalNine - Buat Akun</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="auth-badge">
                <i class="fas fa-user-shield"></i> New Account Setup
            </div>

            <div class="login-header">
                <h1>Buat Akun</h1>
                <p class="login-subtitle">Daftar akun profesional untuk Employee Portal</p>
            </div>

            <button type="button" class="google-auth-btn" data-auth-mode="signup">
                <i class="fab fa-google"></i>
                Daftar dengan Google
            </button>

            <div class="auth-divider"><span>atau daftar manual</span></div>

            <form id="signupForm" class="login-form-styled">
                <div class="form-group">
                    <label for="signupName">Nama Lengkap</label>
                    <input type="text" id="signupName" placeholder="Masukkan nama lengkap" autocomplete="name" required>
                </div>

                <div class="form-group">
                    <label for="signupUsername">Username</label>
                    <input type="text" id="signupUsername" placeholder="Masukkan username" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="nama@email.com" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <div class="password-field">
                        <input type="password" id="signupPassword" placeholder="Minimal 6 karakter" minlength="6" autocomplete="new-password" required>
                        <button type="button" class="password-toggle" data-toggle-password data-target="signupPassword" aria-label="Tampilkan password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength" aria-hidden="true">
                        <div class="password-strength-bar" id="signupPasswordStrengthBar"></div>
                    </div>
                    <small class="form-helper" id="signupPasswordStrengthText">Gunakan kombinasi huruf, angka, dan simbol.</small>
                </div>

                <div class="form-group">
                    <label for="signupConfirmPassword">Konfirmasi Password</label>
                    <div class="password-field">
                        <input type="password" id="signupConfirmPassword" placeholder="Ulangi password" minlength="6" autocomplete="new-password" required>
                        <button type="button" class="password-toggle" data-toggle-password data-target="signupConfirmPassword" aria-label="Tampilkan password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <label class="auth-check" for="signupConsent">
                    <input type="checkbox" id="signupConsent" required>
                    <span>Saya setuju dengan kebijakan privasi dan ketentuan penggunaan.</span>
                </label>

                <button type="submit" class="login-btn">Sign Up</button>
            </form>

            <p class="auth-alt-link">
                Sudah punya akun? <a href="index.html">Kembali ke Login</a>
            </p>

            <div class="login-footer">
                <p>Akun baru otomatis dibuat sebagai role karyawan.</p>
            </div>
        </div>
    </div>

    <script src="js/app-config.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
