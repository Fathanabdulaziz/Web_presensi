<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalNine - Presensi</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="user-theme">
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>GlobalNine</h2>
                <p class="subtitle">Employee Portal</p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i>
                    Dashboard
                </a>
                <a href="attendance.html" class="nav-item active">
                    <i class="fas fa-clock"></i>
                    Presensi
                </a>
                <a href="leave.html" class="nav-item">
                    <i class="fas fa-calendar-times"></i>
                    Cuti
                </a>
                 <a href="client_visit.html" class="nav-item">
                    <i class="fas fa-building"></i>
                    Kunjungan Klien
                </a>
                <a href="profile.html" class="nav-item">
                    <i class="fas fa-user-circle"></i>
                    Profile
                </a>
                <a href="../index.html" class="nav-item" onclick="return logout(event)">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="dashboard-header">
                <div>
                    <h1>Presensi Harian</h1>
                    <p id="currentDateTime"></p>
                </div>
                <div class="header-actions">
                    <button class="notification-btn" id="notificationBtn" type="button" title="Notifikasi" aria-label="Buka notifikasi" aria-expanded="false" aria-controls="notificationPanel">
                        <span class="bell-icon"><i class="fas fa-bell"></i></span>
                        <span class="notification-badge" id="notificationBadge">0</span>
                    </button>
                    <div class="notification-panel" id="notificationPanel" aria-hidden="true">
                        <div class="notification-panel-header">
                            <h4>Notifikasi</h4>
                            <button type="button" id="markAllReadBtn">Tandai dibaca</button>
                        </div>
                        <div class="notification-list" id="notificationList"></div>
                        <div class="notification-panel-footer">
                            <button type="button" id="clearReadBtn">Bersihkan yang sudah dibaca</button>
                        </div>
                    </div>
                    <a href="profile.html" class="user-profile" title="Buka Profile">
                        <div class="avatar" id="userAvatar">U</div>
                    </a>
                </div>
            </header>

            <div class="attendance-container">
                <!-- GPS Location -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-map-marker-alt"></i> Lokasi Anda</h3>
                    </div>
                    <div class="card-body">
                        <div id="locationInfo" class="location-info">
                            <p>Mengambil lokasi GPS...</p>
                        </div>
                        <div id="mapContainer" class="map-container" style="display: none;">
                            <div id="map" style="height: 300px; width: 100%;"></div>
                        </div>
                        <button id="getLocationBtn" class="btn primary" onclick="getLocation()">
                            <i class="fas fa-location-arrow"></i> Dapatkan Lokasi
                        </button>
                    </div>
                </div>

                <!-- Face Recognition -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-camera"></i> Verifikasi Wajah</h3>
                    </div>
                    <div class="card-body">
                        <div class="face-recognition">
                            <video id="video" width="320" height="240" autoplay muted style="display: block;"></video>
                            <canvas id="canvas" width="320" height="240" style="display: none;"></canvas>
                            <div class="face-controls">
                                <button id="startCameraBtn" class="btn secondary" onclick="startCamera()">
                                    <i class="fas fa-play"></i> Mulai Kamera
                                </button>
                                <button id="captureBtn" class="btn primary" onclick="captureFace()" disabled>
                                    <i class="fas fa-camera"></i> Tangkap Wajah
                                </button>
                            </div>
                            <div id="faceStatus" class="face-status">
                                Status: Kamera belum dimulai
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Attendance Form -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-clock"></i> Presensi</h3>
                    </div>
                    <div class="card-body">
                        <form id="attendanceForm" class="attendance-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="attendanceType">Tipe Presensi</label>
                                    <select id="attendanceType" required>
                                        <option value="">Pilih Tipe Presensi</option>
                                        <option value="checkin">Check-in</option>
                                        <option value="checkout">Check-out</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="workLocation">Lokasi Kerja</label>
                                    <select id="workLocation" required>
                                        <option value="">Pilih Lokasi Kerja</option>
                                        <option value="B">B - Bekasi/HO</option>
                                        <option value="O">O - Jakarta, Bogor, Depok, Tangerang</option>
                                        <option value="O1">O1 - Jawa Tengah dan Jawa Timur</option>
                                        <option value="O2">O2 - Sumatra, Bali dan Nusa Tenggara Barat</option>
                                        <option value="O3">O3 - Kalimantan dan Sulawesi</option>
                                        <option value="O4">O4 - Maluku dan Papua</option>
                                    </select>
                                    <div id="workLocationInfo" class="work-location-info" style="display: none; margin-top: 0.5rem; font-size: 0.8rem; color: var(--text-secondary);"></div>
                                    <div id="distanceInfo" class="distance-info" style="display: none; margin-top: 0.5rem;"></div>
                                </div>
                                <div class="form-group">
                                    <label for="siteName">Nama Site</label>
                                    <select id="siteName" required>
                                        <option value="">Pilih Nama Site</option>
                                        <!-- Site names will be populated by JavaScript -->
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="currentTime">Waktu</label>
                                    <input type="text" id="currentTime" readonly>
                                </div>
                            </div>
                            
                            <!-- Check-out specific fields -->
                            <div id="checkoutFields" style="display: none;">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="workDescription">Uraian Pekerjaan</label>
                                        <select id="workDescription" required>
                                            <option value="">Pilih Uraian Pekerjaan</option>
                                            <option value="meeting">Meeting dengan Klien</option>
                                            <option value="site_visit">Kunjungan Site</option>
                                            <option value="maintenance">Maintenance</option>
                                            <option value="installation">Instalasi</option>
                                            <option value="training">Training</option>
                                            <option value="documentation">Dokumentasi</option>
                                            <option value="other">Lainnya</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="overtimeHours">Total Jam Lembur (Opsional)</label>
                                        <input type="number" id="overtimeHours" min="0" step="0.5" placeholder="0">
                                    </div>
                                </div>
                                
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="prayerDhuhurStatus">Status Sholat Dzuhur *</label>
                                        <select id="prayerDhuhurStatus">
                                            <option value="">Pilih status sholat Dzuhur</option>
                                            <option value="berjamaah">Berjamaah</option>
                                            <option value="sendiri">Sendiri</option>
                                            <option value="berhalangan">Berhalangan</option>
                                            <option value="tidak_sholat">Tidak Sholat</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="prayerAsharStatus">Status Sholat Ashar *</label>
                                        <select id="prayerAsharStatus">
                                            <option value="">Pilih status sholat Ashar</option>
                                            <option value="berjamaah">Berjamaah</option>
                                            <option value="sendiri">Sendiri</option>
                                            <option value="berhalangan">Berhalangan</option>
                                            <option value="tidak_sholat">Tidak Sholat</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="drivingNotes">Catatan Driving</label>
                                        <textarea id="drivingNotes" rows="2" placeholder="Catatan terkait driving/mobil"></textarea>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="notes">Catatan (Opsional)</label>
                                <textarea id="notes" rows="3" placeholder="Tambahkan catatan jika diperlukan"></textarea>
                            </div>
                            
                            <div class="form-actions">
                                <button type="submit" class="btn primary" id="submitBtn" disabled>
                                    <i class="fas fa-check"></i> Submit Presensi
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Recent Attendance -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-history"></i> Riwayat Presensi Hari Ini</h3>
                    </div>
                    <div class="card-body">
                        <div id="attendanceHistory" class="attendance-history">
                            <!-- History will be populated by JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/script.js"></script>
    <script src="../js/user-attendance.js"></script>
</body>
</html>
